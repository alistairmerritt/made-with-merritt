<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – Made with Merritt</title>
  <link rel="icon" type="image/svg+xml" href="/assets/pivot-logo-01.svg">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #fff; color: #000; }
    .e404-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 40px;
    }
    .e404-code {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-2);
      margin-bottom: 16px;
    }
    .e404-title {
      font-size: 48px;
      font-weight: 500;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .e404-desc {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(0,0,0,0.5);
      max-width: 420px;
      margin-bottom: 40px;
    }
    .e404-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      .e404-wrap { padding: 60px 24px; }
      .e404-title { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="e404-wrap">
    <p class="e404-code">404</p>
    <h1 class="e404-title">Page not found.</h1>
    <p class="e404-desc">The page you're looking for doesn't exist or may have moved. Try heading back home.</p>
    <div class="e404-actions">
      <a href="/" class="btn-primary">Back to home</a>
      <a href="/pivot/" class="btn-accent">Pivot Dial</a>
    </div>
  </div>
</body>
</html>
